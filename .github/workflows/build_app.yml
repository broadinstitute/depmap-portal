name: Build portal-backend

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - "master"
      - "internal"
      - "qa"
      - "peddep*"
      - "dmc*"
      - "external*"
      - "test-*"
      - "backend-package-upgrade-26q1"
      - "backend-package-upgrade-26q1-phase1"
      - "backend-package-upgrade-26q1-phase2"

env:
  ARTIFACT_REGISTRY_REPO: us-central1-docker.pkg.dev/depmap-consortium/depmap-docker-images/depmap
  DOCKER_TAG: ga2-build-${{ github.run_number }}

jobs:
  run-frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Setup Node 20.20.2
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: 20.20.2
      - name: Install yarn dependencies
        run: "cd frontend && NODE_OPTIONS='--openssl-legacy-provider' CI=true yarn install"
      - name: Build webpack
        run: "cd frontend && NODE_OPTIONS='--openssl-legacy-provider --max_old_space_size=4096' yarn build:portal"
      - name: Run tests
        run: yarn --cwd frontend test

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn --cwd frontend cache dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3.5.0
        id: yarn-cache # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Update build id
        run: |
          echo "SHA: ${{ github.sha }} Build: ${{ github.run_number	}}" > portal-backend/depmap/templates/build_info.html
          echo "SHA=\"${{ github.sha }}\"" > portal-backend/depmap/settings/build.py
          echo "BUILD=\"${{ github.run_number	}}\"" >> portal-backend/depmap/settings/build.py
      - name: Login to Artifact Registry
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2.2.0
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.DEPMAP_DEPLOY_SVC_ACCT }}
      - name: Build Docker image
        run: cd portal-backend && bash build-docker-image.sh ${{ env.ARTIFACT_REGISTRY_REPO }}:${{ env.DOCKER_TAG }}
      - name: Run pyright-ratchet
        run: docker run -e HOME=/install/pyright ${{ env.ARTIFACT_REGISTRY_REPO }}:${{ env.DOCKER_TAG }} pyright-ratchet
      - name: Run import linter
        run: docker run ${{ env.ARTIFACT_REGISTRY_REPO }}:${{ env.DOCKER_TAG }} lint-imports
      - name: Push Docker image
        run: docker push ${{ env.ARTIFACT_REGISTRY_REPO }}:${{ env.DOCKER_TAG }}

  run-pytest:
    runs-on: ubuntu-latest
    needs: build-docker
    strategy:
      matrix:
        pytest-group: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Login to Artifact Registry
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2.2.0
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.DEPMAP_DEPLOY_SVC_ACCT }}
      - name: Pull Docker image
        run: docker pull ${{ env.ARTIFACT_REGISTRY_REPO }}:${{ env.DOCKER_TAG }}
      - name: Get pytest durations
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3.5.0
        with:
          path: .test_durations
          key: ${{ runner.os }}-pytest-durations
      - name: Run pytest
        run: cd portal-backend && docker run -v $PWD/../.test_durations:/install/.test_durations -e PYTHONWARNINGS="ignore::DeprecationWarning" ${{ env.ARTIFACT_REGISTRY_REPO }}:${{ env.DOCKER_TAG }} pytest --splits 5 --group ${{ matrix.pytest-group }}

  push-docker-tags:
    runs-on: ubuntu-latest
    needs:
      - run-pytest
      - run-frontend-tests
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Login to Artifact Registry
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2.2.0
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.DEPMAP_DEPLOY_SVC_ACCT }}
      - name: Pull Docker image
        run: docker pull ${{ env.ARTIFACT_REGISTRY_REPO }}:${{ env.DOCKER_TAG }}
      - name: Push Docker tags
        run: |
          chmod +x ./.github/push_docker.py
          # GITHUB_REF##*/ is github actions magic which expands to the branch name
          ./.github/push_docker.py ${{ env.ARTIFACT_REGISTRY_REPO }} ${{ env.ARTIFACT_REGISTRY_REPO }}:${{ env.DOCKER_TAG }} ${GITHUB_REF##*/}
